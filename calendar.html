<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Calendar — Event Hive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-bar">
        <div class="nav-container">
            <a href="index.html" class="logo">⬡ Event Hive</a>
            <div class="nav-right">
                <a href="calendar.html" class="nav-link nav-link--active">📅 Calendar</a>
                <a href="cart.html" class="nav-link">🛒 My Events</a>
                <a href="profile.html" class="nav-link">👤 Profile</a>
                <div class="notification-container">
                    <button class="notification-btn" onclick="toggleNotifications()">🔔</button>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="notification-header">Notifications</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="calendar-section">
        <div class="container">
            <h1 class="calendar-title">⬡ Event Calendar</h1>

            <!-- Legend -->
            <div class="calendar-legend">
                <div class="legend-item">
                    <span class="legend-dot legend-dot--today"></span> Today
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--occupied"></span> Occupied
                </div>
                <div class="legend-item">
                    <span class="legend-dot legend-dot--free"></span> Free
                </div>
            </div>

            <div class="calendar-container">
                <!-- Calendar grid (fully dynamic) -->
                <div class="calendar-month">
                    <div class="month-header">
                        <button id="prevMonth">◀</button>
                        <h2 id="calendarTitle"></h2>
                        <button id="nextMonth">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <div class="calendar-day-header">Sun</div>
                        <div class="calendar-day-header">Mon</div>
                        <div class="calendar-day-header">Tue</div>
                        <div class="calendar-day-header">Wed</div>
                        <div class="calendar-day-header">Thu</div>
                        <div class="calendar-day-header">Fri</div>
                        <div class="calendar-day-header">Sat</div>
                    </div>
                </div>

                <!-- Sidebar: upcoming list + selected-day detail -->
                <div class="calendar-sidebar">
                    <!-- Day detail panel (shown when clicking a day) -->
                    <div class="day-detail-panel" id="dayDetailPanel">
                        <h3 id="dayDetailTitle">Select a date</h3>
                        <div id="dayDetailBody" class="day-detail-body">
                            <p class="day-detail-empty">Click on any date to see events</p>
                        </div>
                    </div>

                    <!-- Upcoming events list -->
                    <div class="calendar-events-list" id="calendarEventsList">
                        <h3>Upcoming Events</h3>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
function toggleNotifications() {
    const dropdown = document.getElementById('notificationDropdown');
    dropdown.classList.toggle('show');
}

window.addEventListener('click', function(e) {
    if (!e.target.matches('.notification-btn')) {
        const dropdown = document.getElementById('notificationDropdown');
        if (dropdown.classList.contains('show')) {
            dropdown.classList.remove('show');
        }
    }
});

const API_BASE = window.location.origin;
let currentDate = new Date();
let allEvents = [];
let selectedDay = null;
let myRegisteredIds = [];

// ── Load everything ──
async function loadCalendar() {
    try {
        // Load events for the current month from the backend
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth() + 1; // JS months are 0-indexed
        const res = await fetch(`${API_BASE}/api/calendar/${year}/${month}`);
        if (!res.ok) throw new Error('Failed');
        allEvents = await res.json();
    } catch {
        // Fallback to all events
        try {
            const res = await fetch(`${API_BASE}/api/events`);
            if (!res.ok) throw new Error('Failed');
            allEvents = await res.json();
        } catch {
            allEvents = [];
        }
    }

    // Load user's registered event IDs
    try {
        const regRes = await fetch(`${API_BASE}/api/my-registrations`);
        if (regRes.ok) {
            const data = await regRes.json();
            myRegisteredIds = data.ids || [];
        }
    } catch { myRegisteredIds = []; }

    renderCalendar();
    // Load ALL events for the upcoming sidebar
    try {
        const allRes = await fetch(`${API_BASE}/api/events`);
        if (allRes.ok) {
            const allEvts = await allRes.json();
            populateEventList(allEvts);
            updateNotifications(allEvts);
        }
    } catch {}
}

// ── Render calendar grid ──
function renderCalendar() {
    const grid = document.getElementById('calendarGrid');

    // Keep headers, remove days
    const headers = Array.from(grid.querySelectorAll('.calendar-day-header'));
    grid.innerHTML = '';
    headers.forEach(h => grid.appendChild(h));

    const year  = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const today = new Date();

    const monthNames = [
        'January','February','March','April','May','June',
        'July','August','September','October','November','December'
    ];
    document.getElementById('calendarTitle').textContent = `${monthNames[month]} ${year}`;

    const firstDay   = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'calendar-day calendar-day--empty';
        grid.appendChild(empty);
    }

    // Build a quick lookup: dateKey → events[]
    const eventMap = {};
    allEvents.forEach(ev => {
        const d = new Date(ev.time);
        const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(ev);
    });

    for (let day = 1; day <= daysInMonth; day++) {
        const cell  = document.createElement('div');
        const key   = `${year}-${month}-${day}`;
        const evts  = eventMap[key] || [];
        const isToday =
            day === today.getDate() &&
            month === today.getMonth() &&
            year === today.getFullYear();

        cell.className = 'calendar-day';
        if (evts.length > 0) cell.classList.add('event-day');
        if (isToday)         cell.classList.add('calendar-day--today');

        // Badge showing number of events
        cell.innerHTML = evts.length > 0
            ? `${day}<span class="day-badge">${evts.length}</span>`
            : `${day}`;

        // Tooltip data
        if (evts.length > 0) {
            cell.dataset.events = evts.map(e =>
                e.name + ' — ' + new Date(e.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
            ).join(' | ');
        }

        // Click → show detail panel
        cell.addEventListener('click', () => showDayDetail(year, month, day, evts, cell));

        grid.appendChild(cell);
    }

    addTooltips();
}

// ── Day detail panel ──
function showDayDetail(year, month, day, events, clickedCell) {
    // highlight selected
    document.querySelectorAll('.calendar-day--selected').forEach(el => el.classList.remove('calendar-day--selected'));
    clickedCell.classList.add('calendar-day--selected');

    const title = document.getElementById('dayDetailTitle');
    const body  = document.getElementById('dayDetailBody');

    const dateObj = new Date(year, month, day);
    title.textContent = dateObj.toLocaleDateString('en-IN', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

    if (events.length === 0) {
        body.innerHTML = `
            <div class="day-detail-empty">
                <span class="empty-icon">📭</span>
                <p>No events on this date</p>
                <a href="register.html" class="day-register-link">+ Register an event</a>
            </div>`;
        return;
    }

    body.innerHTML = events.map(ev => {
        const isRegistered = myRegisteredIds.includes(ev.id);
        return `
        <div class="day-event-card">
            <div class="day-event-time">
                ${new Date(ev.time).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}
            </div>
            <div class="day-event-info">
                <div class="day-event-name">${ev.name}</div>
                <div class="day-event-cat">${ev.category}</div>
            </div>
            <div class="day-event-price">₹${ev.price}</div>
            <button class="day-event-reg-btn ${isRegistered ? 'registered' : ''}"
                    onclick="calendarRegister(${ev.id}, this)"
                    ${isRegistered ? 'disabled' : ''}>
                ${isRegistered ? '✓ Joined' : '+ Join'}
            </button>
        </div>
    `}).join('');
}

// ── Navigate to a specific event date (from sidebar click) ──
function goToEvent(eventTime) {
    const eventDate = new Date(eventTime);
    currentDate = new Date(eventDate.getFullYear(), eventDate.getMonth(), 1);
    renderCalendar();

    setTimeout(() => {
        const days = document.querySelectorAll('.calendar-day');
        days.forEach(day => {
            if (parseInt(day.textContent) === eventDate.getDate() && day.classList.contains('event-day')) {
                day.classList.add('highlight-day');
                day.click(); // open detail panel
                setTimeout(() => day.classList.remove('highlight-day'), 2000);
            }
        });
    }, 60);
}

// ── Notifications ──
function updateNotifications(events) {
    const dropdown = document.getElementById('notificationDropdown');
    const header   = dropdown.querySelector('.notification-header');
    dropdown.innerHTML = '';
    dropdown.appendChild(header);

    const notifications = [];
    const now = new Date();
    const tomorrow = new Date(); tomorrow.setDate(now.getDate() + 1);
    const seenIds = JSON.parse(localStorage.getItem('seenEvents') || '[]');

    events.forEach(event => {
        const ed = new Date(event.time);
        if (!seenIds.includes(event.id)) {
            notifications.push({ title: `New Event: ${event.name}`, time: 'Just added' });
            seenIds.push(event.id);
        }
        if (ed.getDate() === tomorrow.getDate() && ed.getMonth() === tomorrow.getMonth() && ed.getFullYear() === tomorrow.getFullYear()) {
            notifications.push({ title: `Reminder: ${event.name} is tomorrow`, time: ed.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) });
        }
    });
    localStorage.setItem('seenEvents', JSON.stringify(seenIds));

    if (notifications.length === 0) {
        const el = document.createElement('div');
        el.className = 'notification-item';
        el.innerHTML = '<div class="notification-title">No new notifications</div>';
        dropdown.appendChild(el);
        return;
    }
    notifications.forEach(n => {
        const el = document.createElement('div');
        el.className = 'notification-item';
        el.innerHTML = `<div class="notification-title">${n.title}</div><div class="notification-time">${n.time}</div>`;
        dropdown.appendChild(el);
    });
}

// ── Upcoming list ──
function populateEventList(events) {
    const container = document.getElementById('calendarEventsList');
    const upcoming  = events.filter(e => new Date(e.time) >= new Date()).sort((a, b) => new Date(a.time) - new Date(b.time));

    container.innerHTML = '<h3>Upcoming Events</h3>';

    if (upcoming.length === 0) {
        container.innerHTML += '<p class="no-upcoming">No upcoming events yet</p>';
        return;
    }

    upcoming.forEach(event => {
        const d = new Date(event.time);
        container.innerHTML += `
            <div class="event-list-item" onclick="goToEvent('${event.time}')">
                <div class="event-date">${d.toLocaleDateString('en-IN', { month:'short', day:'numeric' })}</div>
                <div class="event-info-cal">
                    <div class="event-name-cal">${event.name}</div>
                    <div class="event-time-cal">${d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}</div>
                </div>
            </div>`;
    });
}

// ── Tooltips ──
function addTooltips() {
    document.querySelectorAll('.event-day').forEach(day => {
        day.addEventListener('mouseenter', function() {
            if (!this.dataset.events) return;
            const tooltip = document.createElement('div');
            tooltip.className = 'event-tooltip';
            tooltip.textContent = this.dataset.events;
            document.body.appendChild(tooltip);
            const rect = this.getBoundingClientRect();
            let top  = rect.top - tooltip.offsetHeight - 10;
            let left = rect.left + rect.width / 2 - tooltip.offsetWidth / 2;
            if (top < 10) top = rect.bottom + 10;
            if (left < 10) left = 10;
            if (left + tooltip.offsetWidth > window.innerWidth - 10) left = window.innerWidth - tooltip.offsetWidth - 10;
            tooltip.style.position = 'fixed';
            tooltip.style.top  = top + 'px';
            tooltip.style.left = left + 'px';
        });
        day.addEventListener('mouseleave', () => {
            const t = document.querySelector('.event-tooltip');
            if (t) t.remove();
        });
    });
}

// ── Month nav ──
document.getElementById('prevMonth').addEventListener('click', () => {
    const t = document.getElementById('calendarTitle');
    t.classList.remove('slide-left'); t.classList.add('slide-right');
    currentDate.setMonth(currentDate.getMonth() - 1);
    loadCalendar(); // reload from backend for new month
    setTimeout(() => t.classList.remove('slide-right'), 350);
});
document.getElementById('nextMonth').addEventListener('click', () => {
    const t = document.getElementById('calendarTitle');
    t.classList.remove('slide-right'); t.classList.add('slide-left');
    currentDate.setMonth(currentDate.getMonth() + 1);
    loadCalendar(); // reload from backend for new month
    setTimeout(() => t.classList.remove('slide-left'), 350);
});

// ── Register for event from calendar ──
async function calendarRegister(eventId, btn) {
    try {
        const res = await fetch(`${API_BASE}/api/cart/${eventId}`, { method: 'POST' });
        if (res.status === 401) {
            alert('Please verify your SRM email first!');
            window.location.href = 'authentication.html';
            return;
        }
        if (res.ok) {
            btn.textContent = '✓ Joined';
            btn.classList.add('registered');
            btn.disabled = true;
            myRegisteredIds.push(eventId);
        } else {
            const data = await res.json();
            alert(data.error || 'Failed to register');
        }
    } catch (err) {
        console.error(err);
        alert('Network error');
    }
}

loadCalendar();
</script>


</body>
</html>
