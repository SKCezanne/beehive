<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Room - Event Hive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .room-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    .room-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }
    .room-card {
      background: rgba(12, 16, 22, 0.86);
      border: 1px solid rgba(245, 166, 35, 0.12);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }
    .room-meta {
      display: grid;
      gap: 12px;
      color: #d6dae3;
      line-height: 1.5;
    }
    .room-feed {
      display: grid;
      gap: 18px;
    }
    .room-feed__header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    .announcement-compose textarea,
    .reply-box textarea {
      width: 100%;
      min-height: 96px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #0d1117;
      color: #f4f1e8;
      padding: 14px;
      font: inherit;
      resize: vertical;
    }
    .announcement-compose button,
    .reply-box button,
    .room-link-btn {
      margin-top: 12px;
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ffc857, #f59e0b);
      color: #1b1306;
    }
    .announcement-item {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
    }
    .announcement-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #b2b7c2;
      margin-bottom: 10px;
    }
    .announcement-message,
    .reply-message {
      color: #f4f1e8;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .reply-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }
    .reply-item {
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.04);
    }
    .reply-box {
      margin-top: 14px;
    }
    .empty-state {
      color: #b2b7c2;
      text-align: center;
      padding: 28px 10px;
    }
    @media (max-width: 960px) {
      .room-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="top-bar">
    <div class="nav-container">
      <a href="index.html" class="logo">Event Hive</a>
      <div class="nav-right">
        <a href="calendar.html" class="nav-link">Calendar</a>
        <a href="cart.html" class="nav-link">My Events</a>
        <a href="authentication.html" class="nav-link" id="profileNavLink">Sign In</a>
      </div>
    </div>
  </nav>

  <main class="room-shell">
    <div class="room-grid">
      <aside class="room-card">
        <h2 id="eventName">Loading event...</h2>
        <div class="room-meta" id="eventDetails"></div>
        <button type="button" class="room-link-btn" id="openRegistrationBtn" style="display:none;">Open Event Link</button>
      </aside>

      <section class="room-card room-feed">
        <div class="room-feed__header">
          <div>
            <h2 style="margin:0;">Announcements</h2>
            <p style="margin:6px 0 0;color:#b2b7c2;">Hosts can post updates here, and registered users can reply to each announcement.</p>
          </div>
        </div>

        <div class="announcement-compose" id="announcementComposer" style="display:none;">
          <textarea id="announcementMessage" placeholder="Share an update, schedule change, venue info, or anything your participants should know."></textarea>
          <button type="button" id="postAnnouncementBtn">Post Announcement</button>
        </div>

        <div id="announcementsList">
          <div class="empty-state">Loading event room...</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin;
    const eventId = new URLSearchParams(window.location.search).get('eventId');
    let canAnnounce = false;

    function formatDate(value) {
      return new Date(value).toLocaleString('en-IN', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    async function updateTopbarProfileLink() {
      try {
        const res = await fetch(`${API_BASE}/api/me`);
        if (!res.ok) return;
        const data = await res.json();
        const profileNavLink = document.getElementById('profileNavLink');
        profileNavLink.textContent = 'My Profile';
        profileNavLink.href = data.isAdmin ? 'admin.html' : 'profile.html';
      } catch {}
    }

    async function loadEventDetails() {
      if (!eventId) {
        document.getElementById('eventName').textContent = 'Event not found';
        document.getElementById('eventDetails').innerHTML = 'Missing event id.';
        return;
      }

      const res = await fetch(`${API_BASE}/api/events/${eventId}`);
      const event = await res.json().catch(() => ({}));
      if (!res.ok) {
        document.getElementById('eventName').textContent = 'Event not found';
        document.getElementById('eventDetails').innerHTML = event.error || 'Could not load event details.';
        return;
      }

      document.getElementById('eventName').textContent = event.name;
      document.getElementById('eventDetails').innerHTML = `
        <div><strong>Category:</strong> ${event.category}</div>
        <div><strong>Time:</strong> ${formatDate(event.time)}</div>
        <div><strong>Price:</strong> Rs. ${event.price}</div>
        <div><strong>Host:</strong> ${event.created_by || 'Event host'}</div>
        <div><strong>Description:</strong><br>${event.description}</div>
      `;

      if (event.registration_link) {
        const openRegistrationBtn = document.getElementById('openRegistrationBtn');
        openRegistrationBtn.style.display = 'inline-flex';
        openRegistrationBtn.addEventListener('click', () => window.open(event.registration_link, '_blank'));
      }
    }

    function renderAnnouncements(items) {
      const container = document.getElementById('announcementsList');
      if (!items.length) {
        container.innerHTML = '<div class="empty-state">No announcements yet. The host can post the first update here.</div>';
        return;
      }

      container.innerHTML = items.map(item => `
        <article class="announcement-item">
          <div class="announcement-meta">
            <span>${item.authorEmail}</span>
            <span>${formatDate(item.createdAt)}</span>
          </div>
          <div class="announcement-message">${item.message}</div>
          <div class="reply-list">
            ${item.replies.length ? item.replies.map(reply => `
              <div class="reply-item">
                <div class="announcement-meta">
                  <span>${reply.authorEmail}</span>
                  <span>${formatDate(reply.createdAt)}</span>
                </div>
                <div class="reply-message">${reply.message}</div>
              </div>
            `).join('') : '<div class="empty-state" style="padding:14px 10px;">No replies yet.</div>'}
          </div>
          <div class="reply-box">
            <textarea id="reply-${item.id}" placeholder="Reply to this announcement..."></textarea>
            <button type="button" onclick="postReply(${item.id})">Send Reply</button>
          </div>
        </article>
      `).join('');
    }

    async function loadAnnouncements() {
      const res = await fetch(`${API_BASE}/api/announcements/${eventId}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        document.getElementById('announcementsList').innerHTML = `<div class="empty-state">${data.error || 'Could not load the event room.'}</div>`;
        return;
      }

      canAnnounce = data.canAnnounce;
      document.getElementById('announcementComposer').style.display = canAnnounce ? 'block' : 'none';
      renderAnnouncements(data.announcements || []);
    }

    async function postAnnouncement() {
      const textarea = document.getElementById('announcementMessage');
      const message = textarea.value.trim();
      if (!message) return;

      const res = await fetch(`${API_BASE}/api/announcements/${eventId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        alert(data.error || 'Could not post announcement.');
        return;
      }

      textarea.value = '';
      loadAnnouncements();
    }

    async function postReply(announcementId) {
      const textarea = document.getElementById(`reply-${announcementId}`);
      const message = textarea.value.trim();
      if (!message) return;

      const res = await fetch(`${API_BASE}/api/announcements/reply/${announcementId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        alert(data.error || 'Could not post reply.');
        return;
      }

      textarea.value = '';
      loadAnnouncements();
    }

    document.getElementById('postAnnouncementBtn').addEventListener('click', postAnnouncement);

    (async function initPage() {
      await updateTopbarProfileLink();
      await Promise.all([loadEventDetails(), loadAnnouncements()]);
    })();
  </script>
</body>
</html>
