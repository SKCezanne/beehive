<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Event Hive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0c0f14;
      color: #f4f4f5;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .title h1 { margin: 0 0 6px; }
    .title p { margin: 0; color: #a1a1aa; }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font: inherit;
      cursor: pointer;
    }
    .btn-primary { background: #f59e0b; color: #1a1205; font-weight: 800; }
    .btn-subtle { background: rgba(255,255,255,0.06); color: #f4f4f5; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: #131923;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 18px;
    }
    .stat .value { font-size: 28px; font-weight: 800; }
    .panel {
      background: #131923;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }
    th { color: #fcd34d; }
    .stack {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
    }
    .badge-banned { background: rgba(239, 68, 68, 0.18); color: #fca5a5; }
    .status { margin-top: 10px; color: #fcd34d; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="title">
        <h1>Event Hive Admin</h1>
        <p>Manage students, hosted events, registrations, and bans.</p>
      </div>
      <div class="stack">
        <button class="btn btn-subtle" type="button" onclick="window.location.href='index.html'">Open Site</button>
        <button class="btn btn-primary" type="button" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="stats" id="statsGrid"></div>

    <div class="panel">
      <h2>Users</h2>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Department</th>
            <th>Hosted</th>
            <th>Registered</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Events</h2>
      <table>
        <thead>
          <tr>
            <th>Event</th>
            <th>Host</th>
            <th>Time</th>
            <th>Registrations</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="eventsTable"></tbody>
      </table>
      <div class="status" id="statusText"></div>
    </div>
  </div>

  <script>
    function formatDate(value) {
      return value ? new Date(value).toLocaleString('en-IN', {
        day: 'numeric',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      }) : 'Permanent';
    }

    function setStatus(message) {
      document.getElementById('statusText').textContent = message || '';
    }

    async function ensureAdmin() {
      const res = await fetch('/api/me');
      if (!res.ok) {
        window.location.href = 'authentication.html';
        return false;
      }
      const session = await res.json();
      if (!session.isAdmin) {
        window.location.href = 'index.html';
        return false;
      }
      return true;
    }

    async function loadSummary() {
      const res = await fetch('/api/admin/summary');
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat"><div class="value">${data.users}</div><div>Total users</div></div>
        <div class="stat"><div class="value">${data.events}</div><div>Total events</div></div>
        <div class="stat"><div class="value">${data.registrations}</div><div>Total registrations</div></div>
        <div class="stat"><div class="value">${data.bannedUsers}</div><div>Active bans</div></div>
      `;
    }

    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (!res.ok) return;
      const users = await res.json();
      document.getElementById('usersTable').innerHTML = users.map(user => `
        <tr>
          <td>
            <strong>${[user.first_name, user.last_name].filter(Boolean).join(' ') || 'Unnamed user'}</strong><br>
            ${user.email}
          </td>
          <td>${user.department || '-'} ${user.year ? `Year ${user.year}` : ''}</td>
          <td>${user.hosted_count}</td>
          <td>${user.registered_count}</td>
          <td>
            <span class="badge ${user.status === 'banned' ? 'badge-banned' : ''}">
              ${user.status}
            </span>
            ${user.banned_until ? `<div>Until ${formatDate(user.banned_until)}</div>` : ''}
            ${user.ban_reason ? `<div>${user.ban_reason}</div>` : ''}
          </td>
          <td class="stack">
            <button class="btn btn-subtle" type="button" onclick="banUser('${encodeURIComponent(user.email)}', 'limited')">Temp ban</button>
            <button class="btn btn-subtle" type="button" onclick="banUser('${encodeURIComponent(user.email)}', 'permanent')">Perm ban</button>
            <button class="btn btn-primary" type="button" onclick="unbanUser('${encodeURIComponent(user.email)}')">Unban</button>
          </td>
        </tr>
      `).join('');
    }

    async function loadEvents() {
      const res = await fetch('/api/admin/events');
      if (!res.ok) return;
      const events = await res.json();
      document.getElementById('eventsTable').innerHTML = events.map(event => `
        <tr>
          <td>
            <strong>${event.name}</strong><br>
            <span class="badge">${event.category}</span>
          </td>
          <td>${event.created_by || '-'}</td>
          <td>${formatDate(event.time)}</td>
          <td>${event.registration_count}</td>
          <td class="stack">
            <button class="btn btn-subtle" type="button" onclick="deleteEvent(${event.id})">Delete event</button>
          </td>
        </tr>
      `).join('');
    }

    async function banUser(encodedEmail, mode) {
      const reason = prompt('Reason for the ban:') || '';
      const days = mode === 'limited' ? Number(prompt('How many days should the ban last?', '7') || '7') : null;
      const res = await fetch(`/api/admin/users/${encodedEmail}/ban`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode, days, reason }),
      });
      const data = await res.json().catch(() => ({}));
      setStatus(data.message || data.error || 'Action completed');
      await Promise.all([loadSummary(), loadUsers()]);
    }

    async function unbanUser(encodedEmail) {
      const res = await fetch(`/api/admin/users/${encodedEmail}/unban`, { method: 'POST' });
      const data = await res.json().catch(() => ({}));
      setStatus(data.message || data.error || 'Action completed');
      await Promise.all([loadSummary(), loadUsers()]);
    }

    async function deleteEvent(eventId) {
      if (!confirm('Delete this event?')) return;
      const res = await fetch(`/api/events/${eventId}`, { method: 'DELETE' });
      const data = await res.json().catch(() => ({}));
      setStatus(data.message || data.error || 'Action completed');
      await Promise.all([loadSummary(), loadEvents()]);
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'authentication.html';
    }

    (async function init() {
      const ok = await ensureAdmin();
      if (!ok) return;
      await Promise.all([loadSummary(), loadUsers(), loadEvents()]);
    })();
  </script>
</body>
</html>
