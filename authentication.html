<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - Event Hive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, rgba(245, 166, 35, 0.18), transparent 28%),
        linear-gradient(135deg, #0a0c10, #11151c 48%, #17120b);
      color: #f4f1e8;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(460px, 100%);
      background: rgba(18, 21, 28, 0.94);
      border: 1px solid rgba(255, 200, 87, 0.18);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 20px; color: #b9beca; line-height: 1.5; }
    .toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .toggle button, .submit-btn, .secondary-btn {
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      font: inherit;
      cursor: pointer;
    }
    .toggle button {
      background: rgba(255, 255, 255, 0.05);
      color: #f4f1e8;
      border: 1px solid transparent;
    }
    .toggle button.active {
      background: rgba(245, 166, 35, 0.16);
      border-color: rgba(245, 166, 35, 0.45);
    }
    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 13px;
      color: #d9deea;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #0d1117;
      color: #f4f1e8;
      font: inherit;
    }
    input:focus {
      outline: none;
      border-color: rgba(245, 166, 35, 0.8);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.18);
    }
    .submit-btn {
      width: 100%;
      margin-top: 18px;
      background: linear-gradient(135deg, #ffc857, #f59e0b);
      color: #19140a;
      font-weight: 800;
    }
    .secondary-btn {
      width: 100%;
      margin-top: 12px;
      background: transparent;
      color: #f4f1e8;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .otp-panel { display: none; margin-top: 18px; }
    .otp-panel.active { display: block; }
    .status {
      min-height: 22px;
      margin-top: 14px;
      color: #ffc857;
      font-size: 14px;
    }
    .status.error { color: #ff8d8d; }
    .helper-row {
      margin-top: 18px;
      text-align: center;
      color: #b9beca;
      font-size: 14px;
    }
    .helper-row button {
      border: 0;
      background: transparent;
      color: #ffc857;
      font: inherit;
      cursor: pointer;
      padding: 0;
    }
    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #b9beca;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="studentTitle">Log In to Event Hive</h1>
    <p id="studentSubtitle">Existing users can log in with email and password. New users can create an account with OTP verification.</p>

    <div class="toggle">
      <button id="studentMode" class="active" type="button">Student</button>
      <button id="adminMode" type="button">Admin</button>
    </div>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="name@srmist.edu.in">

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter your password">

    <div id="studentActions">
      <button class="submit-btn" type="button" id="sendOtpBtn">Log In</button>
      <div class="otp-panel" id="otpPanel">
        <label for="otp">Verification code</label>
        <input id="otp" type="text" placeholder="Enter the 6-digit OTP">
        <button class="secondary-btn" type="button" id="verifyBtn">Verify and Create Account</button>
      </div>
      <div class="helper-row">
        <span id="helperText">Don't have an account?</span>
        <button type="button" id="switchAuthModeBtn">Create 1!</button>
      </div>
    </div>

    <button class="submit-btn" type="button" id="adminLoginBtn" style="display:none;">Login as Admin</button>
    <div class="status" id="statusText"></div>
    <a class="back-link" href="index.html">Back to home</a>
  </div>

  <script>
    const studentModeBtn = document.getElementById('studentMode');
    const adminModeBtn = document.getElementById('adminMode');
    const studentActions = document.getElementById('studentActions');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const otpPanel = document.getElementById('otpPanel');
    const statusText = document.getElementById('statusText');
    const studentTitle = document.getElementById('studentTitle');
    const studentSubtitle = document.getElementById('studentSubtitle');
    const helperText = document.getElementById('helperText');
    const switchAuthModeBtn = document.getElementById('switchAuthModeBtn');
    const sendOtpBtn = document.getElementById('sendOtpBtn');
    const verifyBtn = document.getElementById('verifyBtn');

    let mode = 'student';
    let studentAuthMode = 'signin';

    function setStatus(message, isError = false) {
      statusText.textContent = message || '';
      statusText.className = isError ? 'status error' : 'status';
    }

    function updateStudentModeUi() {
      const creating = studentAuthMode === 'signup';
      studentTitle.textContent = creating ? 'Create Your Event Hive Account' : 'Log In to Event Hive';
      studentSubtitle.textContent = creating
        ? 'Create an account with your college email, password, and OTP.'
        : 'Use your college email and password to log in. OTP is only used while creating a new account.';
      sendOtpBtn.textContent = creating ? 'Send OTP to Create Account' : 'Log In';
      verifyBtn.textContent = 'Verify and Create Account';
      helperText.textContent = creating ? 'Already have an account?' : "Don't have an account?";
      switchAuthModeBtn.textContent = creating ? 'Log in' : 'Create 1!';
      otpPanel.classList.toggle('active', false);
    }

    function setMode(nextMode) {
      mode = nextMode;
      studentModeBtn.classList.toggle('active', nextMode === 'student');
      adminModeBtn.classList.toggle('active', nextMode === 'admin');
      studentActions.style.display = nextMode === 'student' ? 'block' : 'none';
      adminLoginBtn.style.display = nextMode === 'admin' ? 'block' : 'none';
      otpPanel.classList.remove('active');
      document.getElementById('otp').value = '';
      setStatus('');
    }

    studentModeBtn.addEventListener('click', () => setMode('student'));
    adminModeBtn.addEventListener('click', () => setMode('admin'));
    switchAuthModeBtn.addEventListener('click', () => {
      studentAuthMode = studentAuthMode === 'signin' ? 'signup' : 'signin';
      otpPanel.classList.remove('active');
      document.getElementById('otp').value = '';
      setStatus('');
      updateStudentModeUi();
    });

    async function submitPendingEventIfAny() {
      const meta = JSON.parse(sessionStorage.getItem('pendingEventMeta') || 'null');
      const imageBase64 = sessionStorage.getItem('pendingEventImage');
      if (!meta) return;

      const formData = new FormData();
      Object.entries(meta).forEach(([key, value]) => formData.append(key, value));

      if (imageBase64) {
        const blob = await fetch(imageBase64).then(response => response.blob());
        formData.append('image', blob, 'event-image.png');
      }

      const res = await fetch('/api/events', { method: 'POST', body: formData });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Could not save pending event');
      }

      sessionStorage.removeItem('pendingEventMeta');
      sessionStorage.removeItem('pendingEventImage');
    }

    async function sendOtp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (studentAuthMode === 'signin') {
        const res = await fetch('/api/login-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setStatus(data.error || 'Could not log in', true);
          return;
        }

        try {
          await submitPendingEventIfAny();
          window.location.href = 'index.html';
        } catch (err) {
          setStatus(err.message, true);
        }
        return;
      }

      const res = await fetch('/api/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, action: studentAuthMode }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus(data.error || 'Could not send OTP', true);
        return;
      }

      otpPanel.classList.add('active');
      setStatus('OTP sent. Verify to create your account.');
    }

    async function verifyOtp() {
      const email = document.getElementById('email').value.trim();
      const otp = document.getElementById('otp').value.trim();

      const res = await fetch('/api/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus(data.error || 'Verification failed', true);
        return;
      }

      try {
        await submitPendingEventIfAny();
        window.location.href = 'index.html';
      } catch (err) {
        setStatus(err.message, true);
      }
    }

    async function adminLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        setStatus(data.error || 'Admin login failed', true);
        return;
      }

      window.location.href = 'admin.html';
    }

    async function init() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) return;
        const data = await res.json();
        window.location.href = data.isAdmin ? 'admin.html' : 'index.html';
      } catch (_) {
        // ignore
      }
    }

    document.getElementById('sendOtpBtn').addEventListener('click', sendOtp);
    document.getElementById('verifyBtn').addEventListener('click', verifyOtp);
    document.getElementById('adminLoginBtn').addEventListener('click', adminLogin);

    updateStudentModeUi();
    setMode('student');
    init();
  </script>
</body>
</html>
